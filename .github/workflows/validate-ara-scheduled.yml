name: Temporary scheduled ARA validation

on:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out ARA documentation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/complete-ara-docs
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install contract-validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt

      - name: Validate machine-readable contracts
        run: python scripts/check_contracts.py | tee contract-validation.log

      - name: Validate documentation architecture
        run: python scripts/check_doc_consistency.py | tee documentation-validation.log

      - name: Validate docs.json syntax
        run: python -m json.tool docs.json > /dev/null

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.17.0'

      - name: Install pinned Mintlify CLI
        run: npm install --global mint@4.2.687

      - name: Validate Mintlify content
        run: mint validate | tee mint-validate.log

      - name: Check internal links
        run: mint broken-links | tee mint-links.log

      - name: Create validation source archive
        if: always()
        run: |
          git rev-parse HEAD > validated-head-sha.txt
          tar --exclude=.git --exclude=ara-validation-source.tar.gz -czf ara-validation-source.tar.gz .

      - name: Upload validation source and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ara-scheduled-validation-${{ github.run_attempt }}
          path: |
            ara-validation-source.tar.gz
            validated-head-sha.txt
            contract-validation.log
            documentation-validation.log
            mint-validate.log
            mint-links.log
          if-no-files-found: warn
          retention-days: 7

      - name: Report validation result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          HEAD_SHA="$(cat validated-head-sha.txt 2>/dev/null || printf unknown)"
          BODY=$(cat <<EOF
          <!-- ara-scheduled-validation-report -->
          ## Scheduled ARA validation ${RESULT}

          - Validated head: \`${HEAD_SHA}\`
          - Workflow run ID: \`${RUN_ID}\`
          - Artifact: \`ara-scheduled-validation-${{ github.run_attempt }}\`
          - Checks: contracts, documentation architecture, docs.json, Mintlify validation, internal links
          EOF
          )
          gh api "repos/${{ github.repository }}/issues/1/comments" -f body="$BODY"
