name: Documentation checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  mintlify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run architecture consistency checks
        run: python scripts/check_doc_consistency.py

      - name: Validate docs.json syntax
        run: python -m json.tool docs.json > /dev/null

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"

      - name: Install pinned Mintlify CLI
        run: npm install --global mint@4.0.1125

      - name: Validate Mintlify configuration and content
        run: mint validate

      - name: Check internal links
        run: mint broken-links
