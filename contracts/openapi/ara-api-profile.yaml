openapi: 3.1.1
info:
  title: ARA HTTP API Profile
  version: 1.0.0
  description: >-
    Optional interoperable HTTP profile for Agentic Reference Architecture
    management and execution semantics. ARA does not require REST.
servers:
  - url: https://api.example.invalid
security:
  - bearerAuth: []
paths:
  /v1/runs:
    post:
      operationId: startRun
      summary: Start a durable run from an exact deployment snapshot
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunRequest'
      responses:
        '202':
          description: Run admitted or queued
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandAccepted'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /v1/runs/{runId}:
    get:
      operationId: getRun
      summary: Read the current run projection
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Current run projection
          content:
            application/json:
              schema:
                $ref: '../schemas/run-state.schema.json'
        '404':
          $ref: '#/components/responses/Error'
  '/v1/runs/{runId}:cancel':
    post:
      operationId: cancelRun
      summary: Request cancellation of a run
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionedReasonCommand'
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandAccepted'
        '409':
          $ref: '#/components/responses/Error'
  '/v1/runs/{runId}:resume':
    post:
      operationId: resumeRun
      summary: Continue the same unfinished run without repeating completed effects
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpectedVersionCommand'
      responses:
        '202':
          description: Resume accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandAccepted'
        '409':
          $ref: '#/components/responses/Error'
  '/v1/runs/{runId}:evidenceReplay':
    post:
      operationId: evidenceReplay
      summary: Reconstruct deterministic state from recorded effect outcomes
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetSequence]
              properties:
                targetSequence:
                  type: integer
                  minimum: 0
                verificationMode:
                  type: string
                  enum: [strict, tolerant_reader]
              additionalProperties: false
      responses:
        '202':
          description: Replay job accepted; no external effects will be invoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
  '/v1/runs/{runId}:rerun':
    post:
      operationId: rerun
      summary: Create a new run from historical inputs and explicit overrides
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerunRequest'
      responses:
        '202':
          description: New run admitted or queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandAccepted'
  '/v1/approvals/{approvalId}:decide':
    post:
      operationId: decideApproval
      summary: Record a decision bound to an exact normalized action
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '202':
          description: Decision accepted for validation and recording
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '409':
          $ref: '#/components/responses/Error'
  /v1/run-events:
    post:
      operationId: ingestRunEvent
      summary: Ingest an authenticated external event for a waiting run
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalRunEventRequest'
      responses:
        '202':
          description: Event persisted to the inbox and accepted for correlation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '409':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 256
  responses:
    Error:
      description: Canonical error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    StartRunRequest:
      type: object
      required: [subject, deploymentSnapshotRef, deploymentSnapshotDigest, task]
      properties:
        subject:
          type: object
          required: [kind, versionRef]
          properties:
            kind:
              type: string
              enum: [agent, workflow, execution_plan]
            versionRef:
              type: string
          additionalProperties: false
        deploymentSnapshotRef:
          type: string
        deploymentSnapshotDigest:
          type: string
          pattern: '^sha256:[A-Fa-f0-9]{64}$'
        task:
          type: object
        budgetOverride:
          type: object
        deadline:
          type: string
          format: date-time
      additionalProperties: false
    ExpectedVersionCommand:
      type: object
      required: [expectedStateVersion]
      properties:
        expectedStateVersion:
          type: integer
          minimum: 0
      additionalProperties: false
    VersionedReasonCommand:
      type: object
      required: [expectedStateVersion, reason]
      properties:
        expectedStateVersion:
          type: integer
          minimum: 0
        reason:
          type: string
          minLength: 1
      additionalProperties: false
    RerunRequest:
      type: object
      required: [deploymentSnapshotRef, deploymentSnapshotDigest, inputPolicy, effectPolicy]
      properties:
        deploymentSnapshotRef:
          type: string
        deploymentSnapshotDigest:
          type: string
          pattern: '^sha256:[A-Fa-f0-9]{64}$'
        inputPolicy:
          type: string
          enum: [reuse_exact_input_snapshots, select_explicit_artifacts]
        selectedArtifactRefs:
          type: array
          items:
            type: string
          uniqueItems: true
        effectPolicy:
          type: object
          required: [model, readOnly, mutating]
          properties:
            model:
              type: string
              enum: [reinvoke, use_recorded_results]
            readOnly:
              type: string
              enum: [reinvoke, use_recorded_results]
            mutating:
              type: string
              enum: [deny, use_recorded_results, require_new_authorization]
          additionalProperties: false
      additionalProperties: false
    ApprovalDecisionRequest:
      type: object
      required: [decision, expectedStateVersion, actionDigest]
      properties:
        decision:
          type: string
          enum: [approve, deny, request_changes]
        expectedStateVersion:
          type: integer
          minimum: 0
        actionDigest:
          type: string
          pattern: '^sha256:[A-Fa-f0-9]{64}$'
        comment:
          type: string
      additionalProperties: false
    ExternalRunEventRequest:
      type: object
      required: [targetRunId, correlationKey, eventType, schemaVersion, payload]
      properties:
        targetRunId:
          type: string
        correlationKey:
          type: string
        eventType:
          type: string
          pattern: '^[a-z][a-z0-9_.-]*$'
        schemaVersion:
          type: string
        payload:
          type: object
      additionalProperties: false
    RunCommandAccepted:
      type: object
      required: [runId, status, deploymentSnapshotDigest]
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [created, admitted, queued, cancelling]
        deploymentSnapshotDigest:
          type: string
          pattern: '^sha256:[A-Fa-f0-9]{64}$'
        eventStream:
          type: string
      additionalProperties: false
    JobAccepted:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
        status:
          type: string
          const: accepted
      additionalProperties: false
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [category, code, message, retryable, safeToRetry, effectMayHaveOccurred, correlationId]
          properties:
            category:
              type: string
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            safeToRetry:
              type: boolean
            effectMayHaveOccurred:
              type: boolean
            retryAfter:
              type: string
            correlationId:
              type: string
          additionalProperties: false
      additionalProperties: false
