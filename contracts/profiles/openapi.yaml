openapi: 3.1.1
info:
  title: ARA HTTP API Profile
  version: 1.0.0
paths:
  /runs:
    post:
      operationId: startRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunRequest'
      responses:
        '202':
          description: Run command durably accepted
  /runs/{runId}:
    get:
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Current Run projection
  /runs/{runId}:signal:
    post:
      operationId: signalRun
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Signal durably accepted
  /runs/{runId}:cancel:
    post:
      operationId: cancelRun
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Cancellation durably accepted
  /approval-cases/{approvalCaseId}:decide:
    post:
      operationId: decideApprovalCase
      parameters:
        - name: approvalCaseId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Decision recorded
  /runs/{runId}/events:
    get:
      operationId: streamRunEvents
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Server-sent semantic events
          content:
            text/event-stream:
              schema: { type: string }
components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1 }
  schemas:
    StartRunRequest:
      type: object
      additionalProperties: false
      required: [deploymentSnapshotRef, task]
      properties:
        deploymentSnapshotRef: { type: string }
        task: {}
        budgetOverride:
          type: object
